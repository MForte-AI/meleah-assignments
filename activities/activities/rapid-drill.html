<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rapid Word Drill ⚡</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --gold: #F4A62A; --gold-light: #FFF8E1;
    --green: #4CAF50; --green-light: #E8F5E9;
    --coral: #E8643A; --coral-light: #FCEEE8;
    --purple: #7C5CBF; --purple-light: #EDE8F8;
    --bg: #FFF8F0; --card: #FFFFFF; --text: #2C2C2C;
    --radius: 20px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

  .header {
    background: linear-gradient(135deg, #F57F17, var(--gold));
    color: white; padding: 20px 24px 60px; text-align: center; position: relative;
  }
  .header::after { content:''; position:absolute; bottom:-28px; left:0; right:0; height:56px; background:var(--bg); border-radius:50% 50% 0 0 / 40px 40px 0 0; }
  .header-title { font-size: 22px; font-weight: 900; }
  .header-sub { font-size: 14px; opacity: 0.9; margin-top: 4px; }

  .game { flex: 1; padding: 12px 20px 40px; max-width: 500px; margin: 0 auto; width: 100%; }

  /* Progress */
  .progress-bar { background: #EEE; border-radius: 20px; height: 10px; margin: 16px 0 4px; overflow: hidden; }
  .progress-fill { background: var(--gold); height: 100%; border-radius: 20px; transition: width 0.4s ease; }
  .progress-label { font-size: 12px; font-weight: 800; color: #888; margin-bottom: 20px; display: flex; justify-content: space-between; }

  /* Word card */
  .word-card {
    background: var(--card); border-radius: var(--radius);
    padding: 48px 24px; text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12); margin-bottom: 24px;
    animation: popIn 0.28s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn { from { opacity:0; transform:scale(0.85); } to { opacity:1; transform:scale(1); } }
  .word-display { font-size: 44px; font-weight: 900; color: var(--purple); line-height: 1; }
  .word-hint { font-size: 12px; font-weight: 800; color: #AAA; margin-top: 12px; }

  /* Answer buttons */
  .answer-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
  .ans-btn {
    border: none; border-radius: 18px; padding: 22px 16px;
    font-family: 'Nunito', sans-serif; font-size: 22px; font-weight: 900;
    cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .ans-btn:active { transform: scale(0.95); }
  .ans-btn.got-it   { background: var(--green); color: white; }
  .ans-btn.try-again { background: var(--coral-light); border: 3px solid var(--coral); color: var(--coral); }
  .ans-btn .btn-label { font-size: 12px; font-weight: 700; opacity: 0.85; }

  /* Stats row */
  .stats-row { display: flex; justify-content: space-around; text-align: center; margin-bottom: 16px; }
  .stat { background: white; border-radius: 14px; padding: 10px 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .stat-num { font-size: 22px; font-weight: 900; color: var(--gold); }
  .stat-label { font-size: 11px; font-weight: 800; color: #888; text-transform: uppercase; letter-spacing: 1px; }

  /* Feedback flash */
  .feedback { height: 28px; text-align: center; font-size: 15px; font-weight: 900; }
  .feedback.ok  { color: var(--green); }
  .feedback.err { color: var(--coral); }

  /* Complete */
  .complete-screen {
    display: none; text-align: center; padding: 32px 20px;
    background: var(--card); border-radius: var(--radius);
    box-shadow: 0 6px 24px rgba(0,0,0,0.1);
  }
  .complete-screen.visible { display: block; }
  .medal { font-size: 80px; margin-bottom: 12px; }
  .complete-title { font-size: 26px; font-weight: 900; color: var(--gold); margin-bottom: 8px; }
  .complete-sub { font-size: 15px; color: #666; margin-bottom: 12px; }
  .coins-earned { font-size: 20px; font-weight: 900; color: var(--gold); margin-bottom: 24px; }
  .play-again-btn {
    background: var(--gold); color: white; border: none; border-radius: 16px;
    padding: 16px 32px; font-family: 'Nunito', sans-serif; font-size: 17px; font-weight: 900; cursor: pointer;
  }
  .play-again-btn:active { opacity: 0.9; transform: scale(0.97); }

  .loading { text-align: center; padding: 60px 20px; font-size: 16px; color: #888; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">⚡ Rapid Word Drill</div>
  <div class="header-sub" id="headerSub">Loading your words…</div>
</div>

<div class="game" id="gameArea">
  <div class="loading">⏳ Loading your words…</div>
</div>

<div class="complete-screen" id="completeScreen">
  <div class="medal" id="medalEl">🥇</div>
  <div class="complete-title" id="completeTitle">You Did It!</div>
  <div class="complete-sub" id="completeMsg"></div>
  <div class="coins-earned" id="coinsMsg"></div>
  <button class="play-again-btn" onclick="startGame()">Play Again 🔄</button>
</div>

<script>
const SUPABASE_URL      = 'https://zuzapnckjmyzafblvgrr.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1emFwbmNram15emFmYmx2Z3JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzOTE1MjYsImV4cCI6MjA4Nzk2NzUyNn0.ZasGUhTkmAAzLZWHm1kf2DJWoXSLocHXDGFa1R1zZmo';
const USER_ID = 'meleah';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const COINS_PER_GAME = 5;

let words = [];
let queue = [];
let mastered = [];
let totalTaps = 0;
let locked = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

async function loadWords() {
  const params = new URLSearchParams(window.location.search);
  const weekId = params.get('week');
  const day    = params.get('day') || 'wednesday';

  if (!weekId) {
    document.getElementById('gameArea').innerHTML = '<div class="loading">❌ No week in URL. Open from the weekly plan.</div>';
    return;
  }
  try {
    const { data } = await db.from('meleah_daily_assignments')
      .select('word_list')
      .eq('week_id', weekId)
      .eq('day_of_week', day)
      .eq('track', 'reading')
      .maybeSingle();

    const raw = data?.word_list || '';
    words = raw.split(',').map(w => w.trim()).filter(Boolean);

    if (words.length < 2) {
      document.getElementById('gameArea').innerHTML = '<div class="loading">📋 Not enough words yet — Melissa is still building the word list. Check back later!</div>';
      return;
    }
    document.getElementById('headerSub').textContent = `${words.length} words — master them all!`;
    startGame();
  } catch(e) {
    document.getElementById('gameArea').innerHTML = '<div class="loading">❌ Could not load words. Check internet and try again.</div>';
  }
}

function startGame() {
  document.getElementById('completeScreen').classList.remove('visible');
  document.getElementById('gameArea').style.display = 'block';
  queue = shuffle([...words]);
  mastered = [];
  totalTaps = 0;
  locked = false;
  showWord();
}

function showWord() {
  if (queue.length === 0) { endGame(); return; }
  locked = false;
  const word = queue[0];
  const done = mastered.length;
  const total = words.length;
  const progress = (done / total) * 100;

  document.getElementById('gameArea').innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div class="progress-label">
      <span>${done} mastered</span>
      <span>${queue.length} to go</span>
    </div>

    <div class="stats-row">
      <div class="stat"><div class="stat-num">${done}</div><div class="stat-label">✅ Done</div></div>
      <div class="stat"><div class="stat-num">${queue.length}</div><div class="stat-label">⏳ Left</div></div>
      <div class="stat"><div class="stat-num">${totalTaps}</div><div class="stat-label">Total taps</div></div>
    </div>

    <div class="word-card">
      <div class="word-display">${word}</div>
      <div class="word-hint">Can you read this word?</div>
    </div>

    <div class="feedback" id="feedback">&nbsp;</div>

    <div class="answer-row">
      <button class="ans-btn try-again" onclick="tapWrong()">
        ✗<span class="btn-label">Try Again</span>
      </button>
      <button class="ans-btn got-it" onclick="tapCorrect()">
        ✓<span class="btn-label">Got It!</span>
      </button>
    </div>`;

  // Speak word automatically
  setTimeout(() => speak(word), 500);
}

function tapCorrect() {
  if (locked) return;
  locked = true;
  totalTaps++;
  mastered.push(queue.shift());
  const fb = document.getElementById('feedback');
  if (fb) { fb.textContent = '✅ Nice! Keep going!'; fb.className = 'feedback ok'; }
  speak('Nice!');
  setTimeout(showWord, 600);
}

function tapWrong() {
  if (locked) return;
  locked = true;
  totalTaps++;
  const word = queue.shift();
  queue.push(word);  // recycle to back — OG "no failure" approach
  const fb = document.getElementById('feedback');
  if (fb) { fb.textContent = `🔁 "${word}" will come back around!`; fb.className = 'feedback err'; }
  setTimeout(showWord, 900);
}

async function endGame() {
  document.getElementById('gameArea').style.display = 'none';
  const screen = document.getElementById('completeScreen');
  screen.classList.add('visible');

  const ratio = totalTaps > 0 ? mastered.length / totalTaps : 0;
  const medal = ratio >= 0.85 ? '🥇' : ratio >= 0.65 ? '🥈' : '🥉';
  const medalName = ratio >= 0.85 ? 'Gold' : ratio >= 0.65 ? 'Silver' : 'Bronze';

  document.getElementById('medalEl').textContent = medal;
  document.getElementById('completeTitle').textContent = `${medal} ${medalName}!`;
  document.getElementById('completeMsg').textContent =
    `You mastered all ${mastered.length} words in ${totalTaps} total taps!`;
  document.getElementById('coinsMsg').textContent = `🪙 +${COINS_PER_GAME} coins earned!`;

  speak('Amazing job!');

  try {
    const genId = () => Math.random().toString(36).slice(2);
    await db.from('meleah_coin_history').insert({
      id: genId(), user_id: USER_ID, amount: COINS_PER_GAME,
      reason: `Rapid Word Drill ⚡ ${medal} (${totalTaps} taps)`, timestamp: new Date().toISOString(),
    });
    const { data: st } = await db.from('meleah_state').select('coins_total').eq('user_id', USER_ID).maybeSingle();
    if (st) await db.from('meleah_state').update({ coins_total: (st.coins_total || 0) + COINS_PER_GAME }).eq('user_id', USER_ID);
  } catch(e) { console.warn('Could not award coins:', e); }
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 0.85; utt.pitch = 1.1;
  window.speechSynthesis.speak(utt);
}

loadWords();
</script>
</body>
</html>
